# ─────────────────────────────────────────────────────────────────────────────
#  vLLM Serving Stack — 2x RTX 6000 Pro (Blackwell, 96 GB, PCIe / NO NVLink P2P)
# ─────────────────────────────────────────────────────────────────────────────
#
#  Because the RTX 6000 Pro is PCIe-only (no NVLink P2P), tensor-parallel across
#  the two cards would bottleneck on the PCIe bus. Instead each GPU runs a FULL
#  independent stack and nginx load-balances across them:
#
#    GPU 0 ── llm-0 (NVFP4) ── embedding-0 ── reranker-0  ┐
#                                                          ├─► nginx LB ─► clients
#    GPU 1 ── llm-1 (NVFP4) ── embedding-1 ── reranker-1  ┘
#
#  Public (host) ports — served by nginx, round-robin / least-conn over both GPUs:
#    8000  embedding   (POST /v1/embeddings)
#    8001  llm         (POST /v1/chat/completions)   OpenAI-compatible
#    8002  reranker    (POST /v1/rerank, /v1/score)
#
#  Observability — ONE published port, Grafana is the single pane of glass:
#    3000  Grafana     — GPU dashboards (DCGM) + container logs (Loki)
#  Prometheus / DCGM / cAdvisor / Loki are internal-only; Grafana queries them
#  over the `serving` network. Publish their ports only for raw-UI debugging.
#
#  Everything comes up with a single `docker compose up -d`.
# ─────────────────────────────────────────────────────────────────────────────

x-vllm-common: &vllm-common
  image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
  ipc: host
  restart: unless-stopped
  volumes:
    - ./models:/root/.cache/huggingface
  environment:
    - HF_HOME=/root/.cache/huggingface
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    - API_KEY=${API_KEY:-}
  networks: [serving]

# Reusable GPU reservation anchors (pin a service to ONE physical card)
x-gpu0: &gpu0
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["0"]
            capabilities: [gpu]
x-gpu1: &gpu1
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["1"]
            capabilities: [gpu]

services:

  # ═══════════════════════════════ GPU 0 ═══════════════════════════════════════
  llm-0:
    <<: [*vllm-common, *gpu0]
    container_name: llm-0
    command: &llm-cmd [
      "--model", "${LLM_MODEL:-nvidia/Qwen3.6-35B-A3B-NVFP4}",
      "--host", "0.0.0.0",
      "--port", "8001",
      "--api-key", "${API_KEY:-}",
      "--quantization", "modelopt",
      "--kv-cache-dtype", "fp8",
      "--tensor-parallel-size", "1",
      "--max-model-len", "${LLM_MAX_MODEL_LEN:-65536}",
      "--max-num-batched-tokens", "16384",
      "--gpu-memory-utilization", "0.80",
      "--max-num-seqs", "128",
      "--enable-prefix-caching",
      "--reasoning-parser", "qwen3",
      "--enable-auto-tool-choice",
      "--tool-call-parser", "qwen3_coder",
      "--speculative-config", "{\"method\":\"mtp\",\"num_speculative_tokens\":2}",
      "--trust-remote-code"
    ]

  embedding-0:
    <<: [*vllm-common, *gpu0]
    container_name: embedding-0
    command: &embed-cmd [
      "--model", "${EMBED_MODEL:-BAAI/bge-large-en-v1.5}",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--api-key", "${API_KEY:-}",
      "--dtype", "float16",
      "--max-model-len", "512",
      "--gpu-memory-utilization", "0.05",
      "--trust-remote-code"
    ]

  reranker-0:
    <<: [*vllm-common, *gpu0]
    container_name: reranker-0
    command: &rerank-cmd [
      "--model", "${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}",
      "--host", "0.0.0.0",
      "--port", "8002",
      "--api-key", "${API_KEY:-}",
      "--dtype", "float16",
      "--max-model-len", "512",
      "--gpu-memory-utilization", "0.06",
      "--trust-remote-code"
    ]

  # ═══════════════════════════════ GPU 1 ═══════════════════════════════════════
  llm-1:
    <<: [*vllm-common, *gpu1]
    container_name: llm-1
    command: *llm-cmd

  embedding-1:
    <<: [*vllm-common, *gpu1]
    container_name: embedding-1
    command: *embed-cmd

  reranker-1:
    <<: [*vllm-common, *gpu1]
    container_name: reranker-1
    command: *rerank-cmd

  # ═══════════════════════════ nginx — load balancer ═══════════════════════════
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on: [llm-0, llm-1, embedding-0, embedding-1, reranker-0, reranker-1]
    ports:
      - "8000:8000"   # embedding   (LB over embedding-0, embedding-1)
      - "8001:8001"   # llm         (LB over llm-0, llm-1)
      - "8002:8002"   # reranker    (LB over reranker-0, reranker-1)
    volumes:
      # official nginx image runs envsubst on /etc/nginx/templates/*.template → conf.d/
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - API_KEY=${API_KEY:-}
      # only substitute ${API_KEY} in the template; leave nginx's own $vars alone
      - NGINX_ENVSUBST_FILTER=API_KEY
    networks: [serving]

  # ═══════════════════════ Observability / central logging ═════════════════════

  # Raw NVIDIA GPU metrics (utilization, VRAM, temp, power, ...) — both cards
  dcgm-exporter:
    image: nvidia/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: dcgm-exporter
    restart: unless-stopped
    cap_add: [SYS_ADMIN]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]
    # internal-only: Grafana/Prometheus reach it over the `serving` network.
    # Publish "9400:9400" only if you want to scrape DCGM from outside.
    expose: ["9400"]
    networks: [serving]

  # Per-container CPU / memory / network
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    # internal-only: scraped by Prometheus over the `serving` network.
    expose: ["8080"]
    networks: [serving]

  # Metric store — scrapes dcgm-exporter + cadvisor
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    # internal-only: queried by Grafana over the `serving` network.
    # Publish "9090:9090" only if you want the raw Prometheus UI.
    expose: ["9090"]
    networks: [serving]

  # Log store
  loki:
    image: grafana/loki:3.1.1
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks: [serving]

  # Ships ALL container logs (llm/embed/rerank/nginx/...) into Loki
  promtail:
    image: grafana/promtail:3.1.1
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    networks: [serving]

  # Single pane of glass: GPU dashboards + searchable logs
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_DEFAULT_THEME=light
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus, loki]
    networks: [serving]

networks:
  serving:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
