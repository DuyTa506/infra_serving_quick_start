version: "3.8"

# GPU layout (2x A100 80GB):
#   GPU 0 — LLM shard 0 + reranker  (LLM@0.75 → 60 GB, reranker@0.15 → 12 GB)
#   GPU 1 — LLM shard 1 + embedding (LLM@0.75 → 60 GB, embedding@0.15 → 12 GB)
#
# network_mode: host is required — dockerd runs without bridge networking (RunPod DinD).
# Services bind directly to host ports: 8000 (embed), 8001 (llm), 8002 (rerank).

services:

  # ── LLM ──────────────────────────────────────────────────────────────────────
  llm:
    build: ./llm
    image: vllm-llm:latest
    container_name: vllm-llm
    network_mode: host
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - /workspace/models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - API_KEY=${API_KEY:-}
      - NCCL_P2P_DISABLE=1
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1"]
              capabilities: [gpu]
    command: [
      "--model", "Qwen/Qwen3.6-35B-A3B-FP8",
      "--host", "0.0.0.0",
      "--port", "8001",
      "--api-key", "${API_KEY:-}",
      "--revision", "95a723d08a9490559dae23d0cff1d9466213d989",
      "--tensor-parallel-size", "2",
      "--max-model-len", "131072",
      "--gpu-memory-utilization", "0.75",
      "--reasoning-parser", "qwen3",
      "--enable-auto-tool-choice",
      "--tool-call-parser", "qwen3_coder",
      "--speculative-config", "{\"method\":\"qwen3_next_mtp\",\"num_speculative_tokens\":2}",
      "--language-model-only",
      "--trust-remote-code"
    ]
    restart: unless-stopped

  # ── Embedding ─────────────────────────────────────────────────────────────────
  embedding:
    build: ./embedding
    image: vllm-embedding:latest
    container_name: vllm-embedding
    network_mode: host
    ipc: host
    volumes:
      - /workspace/models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - API_KEY=${API_KEY:-}
    deploy:
      resources:
        reservations:
          devices:
            # GPU 1 only — shares remaining ~20 GB after LLM shard
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    command: [
      "--model", "BAAI/bge-large-en-v1.5",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--api-key", "${API_KEY:-}",
      "--revision", "d4aa6901d3a41ba39fb536a557fa166f842b0e09",
      "--dtype", "float16",
      "--max-model-len", "512",
      "--gpu-memory-utilization", "0.15",
      "--trust-remote-code"
    ]
    restart: unless-stopped

  # ── Reranker ──────────────────────────────────────────────────────────────────
  reranker:
    build: ./reranker
    image: vllm-reranker:latest
    container_name: vllm-reranker
    network_mode: host
    ipc: host
    volumes:
      - /workspace/models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - API_KEY=${API_KEY:-}
    deploy:
      resources:
        reservations:
          devices:
            # GPU 0 only — shares remaining ~20 GB after LLM shard
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    command: [
      "--model", "BAAI/bge-reranker-v2-m3",
      "--host", "0.0.0.0",
      "--port", "8002",
      "--api-key", "${API_KEY:-}",
      "--revision", "953dc6f6f85a1b2dbfca4c34a2796e7dde08d41e",
      "--dtype", "float16",
      "--max-model-len", "512",
      "--gpu-memory-utilization", "0.15",
      "--trust-remote-code"
    ]
    restart: unless-stopped
