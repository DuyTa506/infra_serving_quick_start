server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Discover every running container via the Docker socket and ship its logs.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # container name → `container` label (e.g. llm-0, embedding-1, nginx)
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # compose service → `service` label
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      # everything lands under job="docker" for easy {job="docker"} queries
      - replacement: docker
        target_label: job
