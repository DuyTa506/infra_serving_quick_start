global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # NVIDIA GPU metrics (both RTX 6000 Pro cards)
  - job_name: dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]

  # Per-container CPU / memory / network
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
