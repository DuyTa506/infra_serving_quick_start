# ─── vLLM load balancer — 2× A100 (no Docker) ────────────────────────────────
# Backends: 6 vLLM processes on 127.0.0.1 (GPU 0: 1800x, GPU 1: 1801x).
# Clients hit :8000/:8001/:8002 without auth — nginx injects the API key.
# If you prefer client-provided auth: remove the proxy_set_header Authorization
# lines below.
#
# Usage:
#   apt install -y nginx
#   cp nginx.conf /etc/nginx/sites-available/vllm-stack
#   ln -s /etc/nginx/sites-available/vllm-stack /etc/nginx/sites-enabled/
#   rm /etc/nginx/sites-enabled/default
#   nginx -t && systemctl restart nginx

upstream llm_backend {
    least_conn;                       # long streaming requests → fewest-connections
    server 127.0.0.1:18001 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:18011 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream embedding_backend {
    server 127.0.0.1:18000 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:18010 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream reranker_backend {
    server 127.0.0.1:18002 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:18012 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ── LLM :8001 (OpenAI-compatible, streaming) ─────────────────────────────────
server {
    listen 8001;
    client_max_body_size 64M;

    location / {
        proxy_pass http://llm_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Authorization "Bearer sk-secai2026";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # streaming: don't buffer SSE chunks
        proxy_buffering off;
        chunked_transfer_encoding on;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 600s;

        # if one GPU's replica is down/busy, retry the other
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
}

# ── Embedding :8000 ──────────────────────────────────────────────────────────
server {
    listen 8000;
    client_max_body_size 64M;

    location / {
        proxy_pass http://embedding_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Authorization "Bearer sk-secai2026";
        proxy_set_header Host $host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
}

# ── Reranker :8002 ───────────────────────────────────────────────────────────
server {
    listen 8002;
    client_max_body_size 64M;

    location / {
        proxy_pass http://reranker_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Authorization "Bearer sk-secai2026";
        proxy_set_header Host $host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
}
